<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>[s06 · STATS] Wooster Street Kitchen — Staging</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#f5e6d0;--gold:#c8954a;--red:#c0392b;--dark:#080604;--char:#120d09;--orange:#d4521a;}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--cream)}

/* ── STAGING DEV BANNER ── */
#dev-banner{
  position:fixed;top:0;left:0;right:0;z-index:99999;
  background:#1a1200;border-bottom:1px solid rgba(200,149,74,0.35);
  display:flex;align-items:center;gap:16px;padding:8px 20px;font-size:11px;letter-spacing:0.12em;
}
.db-section{background:rgba(200,149,74,0.15);border:1px solid rgba(200,149,74,0.4);color:var(--gold);padding:3px 10px;font-weight:600;}
.db-name{color:var(--cream);font-weight:500}
.db-hint{color:rgba(245,230,208,0.3);font-size:10px}
.db-status{margin-left:auto;padding:3px 12px;font-weight:700;}
.db-status.clean{background:rgba(80,80,80,0.3);color:#999;border:1px solid rgba(150,150,150,0.3)}
.db-status.draft{background:rgba(200,140,0,0.2);color:#f5a623;border:1px solid rgba(200,140,0,0.4)}

/* ── STATS ── */
#stats{
  padding:96px 56px;
  background:linear-gradient(135deg,rgba(192,57,43,0.06) 0%,rgba(200,149,74,0.04) 100%);
  border-top:1px solid rgba(200,149,74,0.08);
  border-bottom:1px solid rgba(200,149,74,0.08);
  display:grid;grid-template-columns:repeat(4,1fr);gap:48px;
  text-align:center;
}
.big-stat-n{font-family:'Playfair Display',serif;font-size:clamp(52px,6vw,88px);font-weight:900;color:var(--cream);line-height:1;}
.big-stat-n sup{font-size:40%;color:var(--gold);vertical-align:top;margin-top:12px;display:inline-block}
.big-stat-label{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(245,230,208,0.35);margin-top:10px;}
.big-stat-desc{font-size:12px;color:rgba(245,230,208,0.22);margin-top:6px;line-height:1.5}

/* Dividers between stats */
.big-stat{position:relative}
.big-stat:not(:last-child)::after{
  content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);
  width:1px;height:60%;background:linear-gradient(to bottom,transparent,rgba(200,149,74,0.15),transparent);
}

@media(max-width:900px){
  #stats{grid-template-columns:1fr 1fr;gap:36px}
  .big-stat::after{display:none}
}
</style>
</head>
<body style="padding-top:37px">

<!-- STAGING DEV BANNER -->
<div id="dev-banner">
  <span class="db-section">s06</span>
  <span class="db-name">STATS — 4 Key Numbers</span>
  <span class="db-hint">2K+ orders · 48+ items · 4.9★ rating · &lt;35 min delivery</span>
  <span class="db-status clean">● CLEAN</span>
</div>

<!-- STATS -->
<section id="stats">
  <div class="big-stat">
    <div class="big-stat-n">2<sup>K+</sup></div>
    <div class="big-stat-label">Monthly Orders</div>
    <div class="big-stat-desc">Delivered fresh every month</div>
  </div>
  <div class="big-stat">
    <div class="big-stat-n">48<sup>+</sup></div>
    <div class="big-stat-label">Menu Items</div>
    <div class="big-stat-desc">Rotating seasonal selections</div>
  </div>
  <div class="big-stat">
    <div class="big-stat-n">4.9<sup>★</sup></div>
    <div class="big-stat-label">Average Rating</div>
    <div class="big-stat-desc">Across all delivery platforms</div>
  </div>
  <div class="big-stat">
    <div class="big-stat-n">&lt;35<sup>min</sup></div>
    <div class="big-stat-label">Delivery Time</div>
    <div class="big-stat-desc">Guaranteed or it's on us</div>
  </div>
</section>

</body>
</html>
